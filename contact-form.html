<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Pragya Pandya</title>
    <link rel="icon" type="image/x-icon" href="images/lol.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="animations.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <div class="container-box fade-in" style="max-width: 600px;">
            <h1 style="text-align: center;">Lets Work Together</h1>
            <p style="text-align: center; color: #666; margin-bottom: 2rem;">If you are interested in collaborating, please reach out!</p>
            
            <form action="#" method="POST">
                <label style="font-weight: bold; font-size: 0.9rem; color: var(--dark-teal);">Name</label>
                <input type="text" placeholder="Your Name" required>
                
                <label style="font-weight: bold; font-size: 0.9rem; color: var(--dark-teal);">Email</label>
                <input type="email" placeholder="Your Email" required>
                
                <label style="font-weight: bold; font-size: 0.9rem; color: var(--dark-teal);">Message</label>
                <textarea rows="6" placeholder="Your Message" required></textarea>
                
                <div style="text-align: right;">
                    <button type="submit" class="btn btn-primary" style="padding: 0.8rem 2rem;">Submit</button>
                </div>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="main.js"></script>
</body>
</html>
